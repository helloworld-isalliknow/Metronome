<!DOCTYPE html> 
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Running Metronome</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Metronome">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

body{
  font-family:-apple-system;
  text-align:center;
  margin:10px;
  background:#fff;
  color:#000;
}

h1{
  font-size:26px;
  margin-bottom:60px;
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  margin-bottom:60px;
}

.control{
  display:flex;
  flex-direction:column;
  align-items:center;
}

label{
  margin-bottom:8px;
  font-size:14px;
}

/* ✅ 滑杆整体放大（更容易拖） */
input[type=range]{
  -webkit-appearance: slider-vertical;
  writing-mode: bt-lr;

  width:70px;
  height:220px;
  padding:10px;
}

/* ✅ 滑块按钮放大 */
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:28px;
  height:28px;
  border-radius:50%;
  background:#333;
}

/* ✅ 滑轨优化 */
input[type=range]::-webkit-slider-runnable-track{
  width:10px;
  background:#ddd;
  border-radius:5px;
}

/* 按钮 */
button{
  font-size:16px;
  padding:12px 18px;
  margin:6px;
  border-radius:10px;
  border:none;
  color:#fff;
  min-width:70px;
}

.start{
  background:#22c55e;
}

.stop{
  background:#ef4444;
}

.toneBtn{
  background:#ccc;
  padding:12px;
  font-size:14px;
  border-radius:10px;
}

.toneBtn.active{
  background:#f59e0b;
}

.tones{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

</style>
</head>

<body>

<h1>Running Metronome</h1>

<div class="controls">

<div class="control">
<label>BPM</label>
<input type="range" id="bpmRange" min="160" max="200" value="180">
<div id="bpmValue">180</div>
</div>

<div class="control">
<label>Volume</label>
<input type="range" id="volRange" min="0" max="1" step="0.01" value="0.25">
<div id="volValue">25%</div>
</div>

</div>

<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>

<div class="tones">
<button class="toneBtn active" data-tone="drum">鼓点</button>
<button class="toneBtn active" data-tone="wood">木鼓</button>
<button class="toneBtn active" data-tone="bubble">水泡</button>
<button class="toneBtn active" data-tone="bell">铃声</button>
<button class="toneBtn active" data-tone="ping">清脆</button>
<button class="toneBtn active" data-tone="kick">低音</button>
</div>

<script>

let ctx=null;
let nextTickTime=0;
let schedulerTimer=null;
let isRunning=false;

let bpm=180;
let volume=0.25;

let wakeLock=null;

const bpmRange=document.getElementById('bpmRange');
const bpmValue=document.getElementById('bpmValue');

const volRange=document.getElementById('volRange');
const volValue=document.getElementById('volValue');

const toneButtons=document.querySelectorAll('.toneBtn');

bpmRange.addEventListener('input',()=>{
  bpm=parseInt(bpmRange.value);
  bpmValue.innerText=bpm;
});

volRange.addEventListener('input',()=>{
  volume=parseFloat(volRange.value);
  volValue.innerText=Math.round(volume*100)+"%";
});

toneButtons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.classList.toggle('active');
  });
});

async function keepScreenOn(){
  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(e){}
}

async function releaseScreen(){
  if(wakeLock){
    await wakeLock.release();
    wakeLock=null;
  }
}

/* ✅ 所有拍子完全一致（无重拍） */
function beepSingleTone(toneName,time){

  const gainNode=ctx.createGain();
  gainNode.connect(ctx.destination);

  const vol = volume;
  const decay = 0.08;

  gainNode.gain.setValueAtTime(0,time);
  gainNode.gain.linearRampToValueAtTime(vol,time+0.005);
  gainNode.gain.linearRampToValueAtTime(0,time+decay);

  let osc;

  if(toneName==='drum'){
    const buffer=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
    const data=buffer.getChannelData(0);
    for(let i=0;i<data.length;i++){
      data[i]=(Math.random()*2-1)*0.4;
    }
    const noise=ctx.createBufferSource();
    noise.buffer=buffer;
    noise.connect(gainNode);
    noise.start(time);
  }
  else{
    osc=ctx.createOscillator();

    if(toneName==='wood'){
      osc.type='triangle';
      osc.frequency.value=650;
    }
    else if(toneName==='bubble'){
      osc.type='sine';
      osc.frequency.value=450;
    }
    else if(toneName==='bell'){
      osc.type='sine';
      osc.frequency.value=800;
    }
    else if(toneName==='ping'){
      osc.type='triangle';
      osc.frequency.value=900;
    }
    else if(toneName==='kick'){
      osc.type='sine';
      osc.frequency.value=200;
    }

    osc.connect(gainNode);
    osc.start(time);
    osc.stop(time+decay);
  }
}

/* ✅ 不再区分拍子 */
function beep(time){
  const activeTones=Array.from(toneButtons)
    .filter(b=>b.classList.contains('active'))
    .map(b=>b.dataset.tone);

  activeTones.forEach(toneName=>{
    beepSingleTone(toneName,time);
  });
}

function scheduler(){
  const lookahead=0.1;

  while(nextTickTime<ctx.currentTime+lookahead){
    beep(nextTickTime);
    nextTickTime+=60/bpm;
  }

  schedulerTimer=setTimeout(scheduler,25);
}

async function start(){
  if(isRunning) return;

  if(!ctx){
    ctx=new(window.AudioContext||window.webkitAudioContext)();
  }

  await ctx.resume();
  keepScreenOn();

  nextTickTime=ctx.currentTime+0.05;
  scheduler();

  isRunning=true;
}

async function stop(){
  if(!isRunning) return;

  clearTimeout(schedulerTimer);
  schedulerTimer=null;

  await releaseScreen();
  isRunning=false;
}

</script>

</body>
</html>
